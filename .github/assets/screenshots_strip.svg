<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .header { fill: #1e293b; }
      .text-light { fill: #f8fafc; font-family: -apple-system, sans-serif; }
      .text-dim { fill: #94a3b8; font-family: -apple-system, sans-serif; }
      .card { fill: #1e293b; rx: 8; }
      .accent { fill: #3b82f6; }
    </style>
  </defs>
  
  <g transform="translate(20, 20)">
    <rect width="360" height="560" rx="12" class="bg" stroke="#1e293b" stroke-width="4"/>
    <rect width="360" height="60" class="header" rx="12" />
    <text x="20" y="100" class="text-light" font-size="18" font-weight="bold">Checkpoints</text>
    <rect x="20" y="130" width="320" height="90" class="card" />
    <text x="40" y="160" class="text-light" font-size="14" font-weight="bold">React Optimization</text>
    <text x="40" y="190" class="text-dim" font-size="12">Used useMemo and useCallback...</text>
    <rect x="20" y="235" width="320" height="90" class="card" />
    <text x="40" y="265" class="text-light" font-size="14" font-weight="bold">Docker Setup</text>
    <text x="40" y="295" class="text-dim" font-size="12">Configured multi-stage builds...</text>
  </g>

  <g transform="translate(420, 20)">
    <rect width="360" height="560" rx="12" class="bg" stroke="#1e293b" stroke-width="4"/>
    <rect width="360" height="60" class="header" rx="12" />
    <text x="20" y="100" class="text-light" font-size="18" font-weight="bold">Page Content</text>
    <rect x="20" y="130" width="320" height="300" class="card" />
    <text x="40" y="160" class="text-light" font-size="14" font-weight="bold">Local Storage API</text>
    <rect x="40" y="180" width="280" height="8" fill="#334155" rx="4" />
    <rect x="40" y="200" width="260" height="8" fill="#334155" rx="4" />
    <rect x="40" y="220" width="270" height="8" fill="#334155" rx="4" />
    
    <rect x="20" y="450" width="320" height="50" class="card" stroke="#334155" />
    <text x="40" y="480" class="text-dim" font-size="12">Ask a question about this page...</text>
  </g>

  <g transform="translate(820, 20)">
    <rect width="360" height="560" rx="12" class="bg" stroke="#1e293b" stroke-width="4"/>
    <rect width="360" height="60" class="header" rx="12" />
    <text x="20" y="100" class="text-light" font-size="18" font-weight="bold">Settings</text>
    <rect x="20" y="130" width="320" height="60" class="card" />
    <text x="40" y="165" class="text-light" font-size="14">AI Provider</text>
    <rect x="240" y="145" width="80" height="30" fill="#334155" rx="6" />
    <text x="250" y="165" class="text-light" font-size="12">Gemini Pro</text>
    <rect x="20" y="205" width="320" height="60" class="card" />
    <text x="40" y="240" class="text-light" font-size="14">Voice Reader</text>
    <rect x="290" y="225" width="36" height="20" fill="#3b82f6" rx="10" />
    <circle cx="316" cy="235" r="8" fill="#fff" />
  </g>
