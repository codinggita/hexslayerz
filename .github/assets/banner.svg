<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)" />
  <g transform="translate(600, 180)">
    <!-- High tech glowing brain/node design -->
    <circle r="80" fill="none" stroke="#3b82f6" stroke-width="4" stroke-dasharray="10 10" />
    <circle r="60" fill="none" stroke="#8b5cf6" stroke-width="6" opacity="0.8" />
    <path d="M-30,-20 Q0,-50 30,-20 T30,30 Q0,50 -30,30 Z" fill="url(#textGrad)" opacity="0.9"/>
    <!-- Nodes connecting -->
    <line x1="-150" y1="0" x2="-80" y2="0" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <line x1="80" y1="0" x2="150" y2="0" stroke="#8b5cf6" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="-150" x2="0" y2="-80" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="80" x2="0" y2="150" stroke="#8b5cf6" stroke-width="3" opacity="0.5"/>
  </g>
  <text x="600" y="320" font-family="-apple-system, sans-serif" font-weight="900" font-size="56" fill="#ffffff" text-anchor="middle" letter-spacing="6">LSCS v2</text>
  <text x="600" y="360" font-family="-apple-system, sans-serif" font-weight="500" font-size="22" fill="#94a3b8" text-anchor="middle" letter-spacing="2">LOCAL SUMMARIZATION &amp; CHECKPOINT SYSTEM</text>
</svg>
